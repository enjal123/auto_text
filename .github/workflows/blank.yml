name: Daily AutoText Update

on:
  schedule:
    # Runs at 9:50 PM Pacific (4:50 AM UTC)
    - cron: "50 4 * * *"
  workflow_dispatch: 

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4️⃣ Decode Firebase key and write to file
      - name: Write Firebase Key from Base64
        run: echo "$FIREBASE_KEY_B64" | base64 --decode > serviceAccountKey.json
        env:
          FIREBASE_KEY_B64: ${{ secrets.FIREBASE_KEY_B64 }}

      # 5️⃣ Run your Python script
      - name: Run Python script
        run: python main.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
