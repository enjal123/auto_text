name: Daily AutoText Update

on:
  schedule:
    # 6:30 AM PT (1:30 PM UTC)
    - cron: "30 13 * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4️⃣ Write service account key from secret
      - name: Create Service Account File
        run: echo "${{ secrets.FIREBASE_KEY }}" > serviceAccountKey.json

      # 5️⃣ Run your Python script
      - name: Run main.py
        run: python main.py
        env:
          TELEGRAM_API: ${{ secrets.TELEGRAM_API }}
          TELEGRAM_ID: ${{ secrets.TELEGRAM_ID }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
