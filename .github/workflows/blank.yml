name: Daily AutoText Update

on:
  schedule:
    # Runs at 9:50 PM Pacific (4:50 AM UTC)
    - cron: "50 4 * * *"
  workflow_dispatch: 

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create Service Account File
        # This 'cat' method preserves the exact formatting of your JSON secret
        run: |
          cat <<EOF > serviceAccountKey.json
          ${{ secrets.FIREBASE_KEY }}
          EOF

      - name: Run script
        run: python main.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
