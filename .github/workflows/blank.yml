name: Daily AutoText Update

on:
  schedule:
    # 6:30 AM PT (1:30 PM UTC) to account for GitHub delays
    - cron: "30 13 * * *"
  workflow_dispatch: 

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create Service Account File
        run: |
          cat <<'EOF' > serviceAccountKey.json
          ${{ secrets.FIREBASE_KEY }}
          EOF

      - name: Run script
        run: python main.py
        env:
          TELEGRAM_API: ${{ secrets.TELEGRAM_API }}
          TELEGRAM_ID: ${{ secrets.TELEGRAM_ID }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
