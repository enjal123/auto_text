<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoText</title>
    <link rel="stylesheet" href="/frontend/style.css">
</head>

<body>
    <div class="container">
        <h1>AutoText</h1>

        <h2>Enter city(s) for weather</h2>
        <input type="text" id="cityInput" placeholder="San Francisco, Kathmandu">

        <h2>Enter country(s) for news</h2>
        <input type="text" id="countryInput" placeholder="US, Nepal">

        <h2>Your Telegram ID</h2>
        <input type="text" id="telegramInput" placeholder="Telegram chat id">

        <button id="saveBtn">Save Preferences</button>

        <script type="module" src="dashboard.js"></script>

    </div>
</body>
</html>
